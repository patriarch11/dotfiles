set -g status-style 'bg=#f5f5f5,fg=#333333'
set -g status-left '#[fg=#333333,bg=#e0e0e0] #S #[default] '
set -g status-left-length 20
set -g status-right '#[fg=#888888]#{b:pane_current_path} #[fg=#333333,bg=#e0e0e0] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "-") '
set -g status-right-length 60
setw -g window-status-current-format '#[fg=#000000,bg=#d0d0d0] #I:#W '
setw -g window-status-format '#[fg=#888888] #I:#W '
set -g pane-border-style 'fg=#d0d0d0'
set -g pane-active-border-style 'fg=#999999'
set -g message-style 'bg=#e0e0e0,fg=#333333'
