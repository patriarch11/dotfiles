set -g status-style 'bg=#1e1e1e,fg=#cccccc'
set -g status-left '#[fg=#cccccc,bg=#333333] #S #[default] '
set -g status-left-length 20
set -g status-right '#[fg=#888888]#{b:pane_current_path} #[fg=#cccccc,bg=#333333] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo "-") '
set -g status-right-length 60
setw -g window-status-current-format '#[fg=#ffffff,bg=#444444] #I:#W '
setw -g window-status-format '#[fg=#888888] #I:#W '
set -g pane-border-style 'fg=#333333'
set -g pane-active-border-style 'fg=#666666'
set -g message-style 'bg=#333333,fg=#cccccc'
